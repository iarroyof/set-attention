model:
  implementation: set_only
  attention_family: sparse
  backend: local_band
  architecture: transformer_lm
  vocab_size: 0

  d_model: 384
  num_heads: 8
  num_layers: 6
  dim_feedforward: 1536
  dropout: 0.1
  attn_dropout: 0.1
  resid_dropout: 0.1
  ffn_dropout: 0.1
  max_seq_len: 512
  causal: true

  window_size: 16
  stride: 8

  pooling:
    mode: soft_trimmed_boltzmann
    tau: 0.1
    q: 0.85

  feature_mode: hashed_counts
  router_type: learned
  router_topk: 16
  router_multihead: true
  token_mlp:
    enabled: false

  backend_params:
    radius: 4
    # Optional but often helpful for global context in sparse runs:
    # global_set_indices: [0, -1]

data:
  dataset: wikitext2
  batch_size: 16
  seq_len: 512

training:
  seed: 0
  epochs: 10
  lr: 0.0003
  warmup_steps: 1000
  set_diversity_weight: 0.0
  set_diversity_mode: position_contrastive
