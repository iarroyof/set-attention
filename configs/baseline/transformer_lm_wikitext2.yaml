model:
  implementation: baseline_token
  attention_family: dense
  backend: exact
  architecture: transformer_lm
  vocab_size: 0
  d_model: 384
  num_heads: 8
  num_layers: 6
  dim_feedforward: 1536
  dropout: 0.1
  attn_dropout: 0.1
  resid_dropout: 0.1
  ffn_dropout: 0.1
  max_seq_len: 512
  causal: true

data:
  dataset: wikitext2
  batch_size: 16
  seq_len: 512

training:
  seed: 0
  epochs: 10
  lr: 0.0003
  warmup_steps: 1000
  set_diversity_weight: 0.0
  set_diversity_mode: position_contrastive
